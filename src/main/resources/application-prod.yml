# 生产环境配置
server:
  port: 8080

spring:
  # 数据源配置 - 实际生产请修改为对应地址
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/horse_racing?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your-prod-password
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: your-redis-password
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-wait: -1ms
        max-idle: 10
        min-idle: 5

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.horseracing.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 生产环境禁用
knife4j:
  production: true
